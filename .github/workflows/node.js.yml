name: Deploy React to AWS (with Status Tracking)

on:
  push:
    branches: [ "UI" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: VARS3.0

    env:
      CLOUDFRONT_DISTRIBUTION_ID: E3373XJYHACBCI
      S3_BUCKET_NAME: vars3-0-test-appbucket-3d591970
      AWS_REGION: us-east-1
      Version: 3.0.${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Backup Current S3 Content
        run: |
              # Create a timestamp
              TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
              BACKUP_FOLDER="backups/run-${{ env.Version }}_${TIMESTAMP}"
              
              echo "Backing up current files to: $BACKUP_FOLDER"
              
              # Copy existing files to the backup subfolder within the same bucket
              # We exclude the 'backups/' directory itself to avoid recursive backups
              aws s3 cp s3://${{ env.S3_BUCKET_NAME }}/ s3://${{ env.S3_BUCKET_NAME }}/$BACKUP_FOLDER/ --recursive --exclude "backups/*"

      - name: Upload to S3 (Sync)
        run: |
          # We sync 'dist' to the root of the bucket
          # EXTREMELY IMPORTANT: --exclude "backups/*" ensures the sync 
          # doesn't delete the backup folder we just created.
          aws s3 sync dist/ s3://${{ env.S3_BUCKET_NAME }}/ --delete --exclude "backups/*"

      - name: Start CloudFront Invalidation
        id: invalidate
        run: |
          # Create invalidation and capture the ID
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          
          echo "INVALIDATION_ID=$INVALIDATION_ID" >> $GITHUB_ENV
          echo "Started invalidation: $INVALIDATION_ID"

      - name: Wait for Invalidation (Deployment Status)
        run: |
          echo "Waiting for CloudFront to propagate changes to all edge locations..."
          # This step will stay "Running" until the status is 'Completed'
          # Similar to 'aws ecs wait services-stable'
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id ${{ env.INVALIDATION_ID }}
          echo "✅ Deployment is now LIVE globally."

      - name: Final Summary
        if: always()
        run: |
          echo "### 🚀 Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Sync:** Success ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront Status:** ${{ job.status == 'success' && 'LIVE ✅' || 'FAILED ❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Invalidation ID:** `${{ env.INVALIDATION_ID }}`" >> $GITHUB_STEP_SUMMARY

          
