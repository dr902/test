name: Build and Push Docker Image to ECR

on:
  workflow_dispatch: 
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: vars3.0-test-repo
  VERSION: 3.0.${{ github.run_number }}
  Task_Definition: VARS3-0-Test-Task
  Cluster: VARS3-0-Test-Cluster
  Service: VARS3-0-Test-Service
  account_id: 366115556563

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: VARS3.0

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    # 1. NOTIFY STARTED
    - name: Notify Teams - Started
      uses: mikesprague/teams-incoming-webhook-action@v1
      with:
        github-token: ${{ github.token }}
        webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: "🚀 Workflow Started"
        message: "Starting Build & Push for version **${{ env.VERSION }}** in **${{ github.repository }}**"
        color: "info"
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Docker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        TIMESTAMP=$(date +'%Y.%m.%d.%H.%M')
        # Build the Docker image
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.VERSION }} .
        
        # Tag additional versions
        docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.VERSION }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
        docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.VERSION }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$TIMESTAMP
        
        # Push all tags to ECR
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.VERSION }}
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$TIMESTAMP
        
     # 2. NOTIFY IF BUILD FAILS
    - name: Notify Teams - Build Failed
      if: failure()
      uses: mikesprague/teams-incoming-webhook-action@v1
      with:
        github-token: ${{ github.token }}
        webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: "❌ Build Failed"
        message: "The Docker Build or Push stage failed for version ${{ env.VERSION }}."
        color: "failure"

  deploy:
      runs-on: ubuntu-latest
      needs: build-and-push # Ensures build finishes first
      environment: VARS3.0
  
      steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
  
      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.Task_Definition }} \
            --query taskDefinition \
            > task-definition.json
  
      - name: Update image in task definition
        env:
          # Correct URI format: account_id.dkr.ecr.region.amazonaws.com/repo:tag
          IMAGE: ${{ env.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.VERSION }}
        run: |
          echo "Latest ECR image URI: $IMAGE"
          cat task-definition.json | \
          jq --arg IMAGE "$IMAGE" \
          '.containerDefinitions[0].image=$IMAGE | 
          del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
          > new-task-definition.json
  
      - name: Register new task definition
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          # This makes the variable available to the next step
          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV
          echo "Registered Task Definition: $TASK_DEF_ARN"
  
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.Cluster }} \
            --service ${{ env.Service }} \
            --task-definition ${{ env.TASK_DEF_ARN }}
  
      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.Cluster }} \
            --service ${{ env.Service }} 
  
      - name: Deployment successful
        run: echo "ECS deployment completed successfully 🚀"

      - name: Notify Teams (Final Status)
        if: always() # This ensures it runs even if previous steps failed
        uses: mikesprague/teams-incoming-webhook-action@v1
        with:
          github-token: ${{ github.token }}
          webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          # Dynamic title and color based on the job status
          title: "${{ job.status == 'success' && '✅ Deployment Success' || '❌ Deployment Failed' }}"
          color: "${{ job.status == 'success' && 'success' || 'failure' }}"
          message: "VARS 3.0 Version **${{ env.VERSION }}** finished with status: **${{ job.status }}**"
    


    
