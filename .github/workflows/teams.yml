name: Teams notification
on:
  workflow_dispatch:
    inputs:
      Approved_By:
        description: 'Approved by: '
        required: true
        type: string

      
        
jobs:
  teams:  
    runs-on: ubuntu-22.04
    environment: VARS3.0

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Get Commit Message
        id: get_msg
        run: |
            # Gets the subject line of the latest commit
            MSG=$(git log -1 --pretty=%s)
            echo "commit_msg=$MSG" >> $GITHUB_OUTPUT
            
      - name: Get Timestamp
        id: timestamp
        run: |
          echo "time=$(TZ='Asia/Kolkata' date '+%d %b %Y, %I:%M %p IST')" >> $GITHUB_OUTPUT

      - name: Notify Teams (Final Status)
        if: always() # This ensures it runs even if previous steps failed
        uses: mikesprague/teams-incoming-webhook-action@v1
        with:
          github-token: ${{ github.token }}
          webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          # Dynamic title and color based on the job status
          title: "${{ job.status == 'success' && '✅ Deployment Success' || '❌ Deployment Failed' }}"
          color: "${{ job.status == 'success' && 'success' || 'failure' }}"
          # message: "FlexOS PROD Prod updated with FE - Version no: ${{github.event.inputs.Version}}
          #           status: **${{ job.status }}**"
 
          message: |
            **Repo:** ${{ github.repository }}\n\
            **Branch:** ${{ github.ref_name }}\n\
            **Commit:** ${{ github.sha }}\n\
            **Message:** ${{ steps.get_msg.outputs.commit_msg}}\n\
            **Triggered By:** ${{ github.actor }}\n\
            **Approved By:** ${{ inputs.Approved_By }}\n\
            **Timestamp:** ${{ steps.timestamp.outputs.time }}\n\

            
